<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-device-theme="desktop" data-mobile-input-active="false">
    <main id="screen-shell">
        <div id="meta-column-left" class="meta-column" aria-hidden="true">
            <div id="ephemeral-message-left" class="ephemeral-message"></div>
            <div id="ephemeral-message-lower-left" class="ephemeral-message"></div>
        </div>
        <div id="terminal-stage" data-layout="transcript-only">
            <header id="status-bar" aria-label="Game status">
                    <div id="status-meta-line" data-source="" aria-live="polite"></div>
            </header>
            <div id="mobile-panel-tabs" aria-label="Mobile panel tabs" aria-hidden="true">
                <button type="button" class="mobile-panel-tab" data-panel-id="map" hidden>MAP</button>
                <button type="button" class="mobile-panel-tab" data-panel-id="inventory" hidden>INVENTORY</button>
                <button type="button" class="mobile-panel-tab" data-panel-id="memory" hidden>MEMORY</button>
            </div>
            <div id="terminal-content">
                <div id="text-grid-container">
                    <div id="transcript-output" aria-live="polite"></div>
                </div>
                <aside id="panel-stack" aria-label="Interface panels" aria-hidden="true">
                    <section id="panel-map" class="ui-panel" data-state="locked" data-visible="false" aria-hidden="true">
                        <div class="panel-heading">MAP</div>
                        <pre id="panel-map-body" class="panel-body">Spatial overlay unavailable.</pre>
                    </section>
                    <section id="panel-inventory" class="ui-panel" data-state="locked" data-visible="false" aria-hidden="true">
                        <div class="panel-heading">INVENTORY</div>
                        <pre id="panel-inventory-body" class="panel-body">Retention overlay unavailable.</pre>
                    </section>
                    <section id="panel-memory" class="ui-panel" data-state="locked" data-visible="false" aria-hidden="true">
                        <div class="panel-heading">MEMORY</div>
                        <pre id="panel-memory-body" class="panel-body">Address bus dark.</pre>
                    </section>
                </aside>
            </div>
            <form id="command-bar" aria-label="Command input" novalidate>
                <label id="command-prompt" for="cli-input">&gt;</label>
                <input
                    type="text"
                    id="cli-input"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    enterkeyhint="send"
                    aria-label="Command input"
                    placeholder="Enter command"
                >
                <button id="command-submit" type="submit">Enter</button>
            </form>
        </div>
        <div id="meta-column-right" class="meta-column" aria-hidden="true">
            <div id="ephemeral-message-right" class="ephemeral-message"></div>
            <div id="ephemeral-message-lower-right" class="ephemeral-message"></div>
        </div>
    </main>
    <script type="module" src="game.js"></script>
</body>
</html>
