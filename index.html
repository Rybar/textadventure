<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="screen-shell">
        <div id="ephemeral-layer" aria-hidden="true">
            <div id="ephemeral-message"></div>
        </div>
        <div id="text-grid-container">
            <pre id="text-grid" aria-live="polite"></pre>
        </div>
    </main>
    <input type="text" id="cli-input" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Command input">
    <script type="module" src="game.js"></script>
</body>
</html>
